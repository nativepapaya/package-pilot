name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_release:
    name: Build unsigned release
    if: github.ref == 'refs/heads/main'
    runs-on: windows-2025
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      release_sequence: ${{ steps.version.outputs.release_sequence }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Verify PowerShell tooling
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion -lt [Version]'7.5') {
              throw 'Package Pilot repository tooling requires PowerShell 7.5 or later.'
          }
          Write-Host "Using PowerShell $($PSVersionTable.PSVersion)."

      - name: Calculate release version
        id: version
        shell: pwsh
        env:
          WORKFLOW_RUN_NUMBER: ${{ github.run_number }}
        run: |
          $ErrorActionPreference = 'Stop'

          [uint64]$runNumber = 0
          if (-not [uint64]::TryParse($env:WORKFLOW_RUN_NUMBER, [ref]$runNumber) -or $runNumber -lt 1) {
              throw "GitHub supplied an invalid workflow run number: '$env:WORKFLOW_RUN_NUMBER'."
          }

          # The repository's pre-automation development package is 1.0.0.4.
          # Base-65536 encoding keeps every MSIX segment in its UInt16 range
          # while preserving monotonically increasing package versions.
          [uint64]$sequence = $runNumber + 4
          [uint64]$build = [Math]::Floor($sequence / 65536)
          [uint64]$revision = $sequence % 65536
          if ($build -gt [uint16]::MaxValue) {
              throw "Release sequence $sequence exceeds the MSIX version capacity."
          }

          $packageVersion = "1.0.$build.$revision"
          $tagName = "v1.0.$sequence"

          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_sequence=$sequence" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release $tagName uses MSIX version $packageVersion."

      - name: Restore
        shell: pwsh
        run: dotnet restore PackagePilot.slnx

      - name: Run deterministic tests
        shell: pwsh
        run: >-
          dotnet test tests/PackagePilot.Tests/PackagePilot.Tests.csproj
          --configuration Release
          --no-restore
          --logger "console;verbosity=normal"

      - name: Test release scripts
        shell: pwsh
        run: |
          ./build/tests/New-AppInstaller.Tests.ps1
          ./build/tests/New-MsixBundle.Tests.ps1
          ./build/tests/JsonSchema.Tests.ps1
          ./build/tests/NativeCommand.Tests.ps1
          ./build/tests/ParallelPackageBuild.Tests.ps1
          ./build/tests/PackagingArchitecture.Tests.ps1
          ./build/tests/Set-PackageVersion.Tests.ps1
          ./build/tests/StageUnsignedRelease.Tests.ps1

      - name: Test manual release security on PowerShell 7
        shell: pwsh
        run: ./build/tests/ManualReleaseSecurity.Tests.ps1

      - name: Test manual release security on Windows PowerShell 5.1
        shell: powershell
        run: |
          ./build/tests/New-MsixBundle.Tests.ps1
          ./build/tests/NativeCommand.Tests.ps1
          ./build/tests/ManualReleaseSecurity.Tests.ps1

      - name: Set package version
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: ./build/Set-PackageVersion.ps1 -Version $env:PACKAGE_VERSION

      - name: Build unsigned x64 and ARM64 MSIX packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./build/Build-UnsignedPackages.ps1 `
              -ArtifactsRoot (Join-Path $env:RUNNER_TEMP 'PackagePilotBuild') `
              -PackageOutputRoot (Join-Path $env:RUNNER_TEMP 'AppPackages') `
              -LogDirectory (Join-Path $env:RUNNER_TEMP 'PackagePilotBuildLogs') |
              Format-Table -AutoSize

      - name: Upload package build logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-pilot-build-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}\PackagePilotBuildLogs
          if-no-files-found: ignore
          retention-days: 14

      - name: Stage unsigned release assets
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $packageOutput = Join-Path $env:RUNNER_TEMP 'AppPackages'
          $stagingDirectory = Join-Path $env:RUNNER_TEMP 'package-pilot-unsigned'
          ./build/Stage-UnsignedRelease.ps1 `
              -PackageOutputDirectory $packageOutput `
              -StagingDirectory $stagingDirectory `
              -Version $env:PACKAGE_VERSION `
              -Repository $env:GITHUB_REPOSITORY

      - name: Create release metadata
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
          RELEASE_SEQUENCE: ${{ steps.version.outputs.release_sequence }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT_SHA: ${{ github.sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          ARTIFACT_NAME: package-pilot-unsigned-${{ github.run_id }}-${{ github.run_attempt }}
          WORKFLOW_NAME: Release
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          if ($PSVersionTable.PSVersion -lt [Version]'7.5') {
              throw 'Release metadata generation requires PowerShell 7.5 or later.'
          }

          [uint64]$releaseSequence = 0
          if (-not [uint64]::TryParse($env:RELEASE_SEQUENCE, [ref]$releaseSequence) -or $releaseSequence -lt 5) {
              throw "The calculated release sequence '$env:RELEASE_SEQUENCE' is invalid."
          }

          $expectedBuild = [Math]::Floor($releaseSequence / 65536)
          $expectedRevision = $releaseSequence % 65536
          $expectedPackageVersion = "1.0.$expectedBuild.$expectedRevision"
          if ($env:PACKAGE_VERSION -ne $expectedPackageVersion) {
              throw "Package version '$env:PACKAGE_VERSION' does not match release sequence $releaseSequence."
          }

          $expectedTagName = "v1.0.$releaseSequence"
          if ($env:TAG_NAME -ne $expectedTagName) {
              throw "Tag name '$env:TAG_NAME' does not match release sequence $releaseSequence."
          }
          if ($env:SOURCE_REPOSITORY -notmatch '^[^/\s]+/[^/\s]+$') {
              throw "GitHub supplied an invalid repository name: '$env:SOURCE_REPOSITORY'."
          }
          if ($env:SOURCE_COMMIT_SHA -notmatch '^[0-9a-fA-F]{40}$') {
              throw "GitHub supplied an invalid commit SHA: '$env:SOURCE_COMMIT_SHA'."
          }

          [uint64]$runId = 0
          if (-not [uint64]::TryParse($env:WORKFLOW_RUN_ID, [ref]$runId) -or $runId -lt 1) {
              throw "GitHub supplied an invalid workflow run ID: '$env:WORKFLOW_RUN_ID'."
          }
          [uint64]$runNumber = 0
          if (-not [uint64]::TryParse($env:WORKFLOW_RUN_NUMBER, [ref]$runNumber) -or $runNumber -lt 1) {
              throw "GitHub supplied an invalid workflow run number: '$env:WORKFLOW_RUN_NUMBER'."
          }
          [uint64]$runAttempt = 0
          if (-not [uint64]::TryParse($env:WORKFLOW_RUN_ATTEMPT, [ref]$runAttempt) -or $runAttempt -lt 1) {
              throw "GitHub supplied an invalid workflow run attempt: '$env:WORKFLOW_RUN_ATTEMPT'."
          }

          $expectedArtifactName = "package-pilot-unsigned-$runId-$runAttempt"
          if ($env:ARTIFACT_NAME -ne $expectedArtifactName) {
              throw "Artifact name '$env:ARTIFACT_NAME' does not match '$expectedArtifactName'."
          }
          if ($env:WORKFLOW_NAME -ne 'Release') {
              throw "Workflow name '$env:WORKFLOW_NAME' is invalid."
          }

          $stagingDirectory = Join-Path $env:RUNNER_TEMP 'package-pilot-unsigned'
          foreach ($fileName in @(
              'PackagePilot.msixbundle'
              'Microsoft.WindowsAppRuntime.2.x64.msix'
              'Microsoft.WindowsAppRuntime.2.arm64.msix'
              'PackagePilot.appinstaller'
          )) {
              if (-not (Test-Path -LiteralPath (Join-Path $stagingDirectory $fileName) -PathType Leaf)) {
                  throw "Unsigned release asset '$fileName' is missing."
              }
          }

          $generatedAtUtc = [DateTimeOffset]::UtcNow.ToString(
              'o',
              [Globalization.CultureInfo]::InvariantCulture)
          $metadata = [ordered]@{
              schemaVersion = 2
              packageVersion = $env:PACKAGE_VERSION
              architectures = @('x64', 'arm64')
              packageAsset = 'PackagePilot.msixbundle'
              releaseSequence = $releaseSequence
              tagName = $env:TAG_NAME
              repository = $env:SOURCE_REPOSITORY
              commitSha = $env:SOURCE_COMMIT_SHA.ToLowerInvariant()
              runId = $runId
              runNumber = $runNumber
              runAttempt = $runAttempt
              artifactName = $env:ARTIFACT_NAME
              workflowName = $env:WORKFLOW_NAME
              generatedAtUtc = $generatedAtUtc
          }

          $metadataPath = Join-Path $stagingDirectory 'release-metadata.json'
          $metadataJson = $metadata | ConvertTo-Json -Depth 3
          [IO.File]::WriteAllText(
              $metadataPath,
              $metadataJson + [Environment]::NewLine,
              [Text.UTF8Encoding]::new($false))

          $metadataBytes = [IO.File]::ReadAllBytes($metadataPath)
          ./build/Test-JsonSchema.ps1 `
              -DocumentKind ReleaseMetadata `
              -Base64Utf8Json ([Convert]::ToBase64String($metadataBytes)) | Out-Null

          $expectedStagedNames = @(
              'Microsoft.WindowsAppRuntime.2.arm64.msix'
              'Microsoft.WindowsAppRuntime.2.x64.msix'
              'PackagePilot.appinstaller'
              'PackagePilot.msixbundle'
              'release-metadata.json'
          )
          $stagedItems = @(Get-ChildItem -LiteralPath $stagingDirectory -Force)
          $actualStagedNames = @($stagedItems | ForEach-Object Name | Sort-Object)
          if ($stagedItems.Count -ne $expectedStagedNames.Count -or
              ($actualStagedNames -join ',') -ne ($expectedStagedNames -join ',') -or
              @($stagedItems | Where-Object { -not $_.PSIsContainer }).Count -ne $expectedStagedNames.Count) {
              throw "The unsigned release artifact contains an unexpected file or directory: '$($actualStagedNames -join ',')'."
          }

          $validatedMetadata = [Text.UTF8Encoding]::new($false, $true).GetString($metadataBytes) |
              ConvertFrom-Json -AsHashtable -DateKind String
          if ($validatedMetadata.schemaVersion -ne 2 -or
              $validatedMetadata.packageVersion -ne $env:PACKAGE_VERSION -or
              ($validatedMetadata.architectures -join ',') -ne 'x64,arm64' -or
              $validatedMetadata.packageAsset -ne 'PackagePilot.msixbundle' -or
              $validatedMetadata.releaseSequence -ne $releaseSequence -or
              $validatedMetadata.tagName -ne $env:TAG_NAME -or
              $validatedMetadata.repository -ne $env:SOURCE_REPOSITORY -or
              $validatedMetadata.commitSha -ne $env:SOURCE_COMMIT_SHA.ToLowerInvariant() -or
              $validatedMetadata.runId -ne $runId -or
              $validatedMetadata.runNumber -ne $runNumber -or
              $validatedMetadata.runAttempt -ne $runAttempt -or
              $validatedMetadata.artifactName -ne $env:ARTIFACT_NAME -or
              $validatedMetadata.workflowName -ne $env:WORKFLOW_NAME -or
              $validatedMetadata.generatedAtUtc -ne $generatedAtUtc) {
              throw 'The generated release metadata failed validation.'
          }

      - name: Upload unsigned release payload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-pilot-unsigned-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}\package-pilot-unsigned
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
