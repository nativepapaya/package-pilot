name: Validate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Restore
        shell: pwsh
        run: dotnet restore PackagePilot.slnx

      - name: Build
        shell: pwsh
        run: dotnet build PackagePilot.slnx --configuration Release --no-restore

      - name: Build ARM64
        shell: pwsh
        run: >-
          dotnet build src/PackagePilot.App/PackagePilot.App.csproj
          --configuration Release
          --runtime win-arm64
          -p:Platform=ARM64

      - name: Run deterministic tests
        shell: pwsh
        run: >-
          dotnet test tests/PackagePilot.Tests/PackagePilot.Tests.csproj
          --configuration Release
          --no-build
          --no-restore
          --logger "console;verbosity=normal"

      - name: Test release tooling
        shell: pwsh
        run: |
          ./build/tests/New-AppInstaller.Tests.ps1
          ./build/tests/New-MsixBundle.Tests.ps1
          ./build/tests/PackagingArchitecture.Tests.ps1
          ./build/tests/Set-PackageVersion.Tests.ps1

      - name: Test manual release security on Windows PowerShell 5.1
        shell: powershell
        run: ./build/tests/ManualReleaseSecurity.Tests.ps1

      - name: Smoke test signed packaged UI
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $smokeRoot = Join-Path $env:RUNNER_TEMP 'package-pilot-ui-smoke'
          $packageOutput = Join-Path $smokeRoot 'packages'
          $screenshotOutput = Join-Path $smokeRoot 'screenshots'
          $certificatePath = Join-Path $smokeRoot 'PackagePilot.Smoke.cer'
          [IO.Directory]::CreateDirectory($smokeRoot) | Out-Null

          ./build/Set-PackageVersion.ps1 -Version '1.0.60000.1'
          $certificate = ./build/New-DevelopmentCertificate.ps1 `
              -CertificatePath $certificatePath |
              Out-String |
              ConvertFrom-Json
          $packageOutputWithSeparator = $packageOutput + [IO.Path]::DirectorySeparatorChar

          dotnet publish src/PackagePilot.App/PackagePilot.App.csproj `
              --configuration Release `
              --runtime win-x64 `
              --self-contained false `
              -p:Platform=x64 `
              -p:GenerateAppxPackageOnBuild=true `
              -p:AppxPackageSigningEnabled=true `
              -p:PackageCertificateThumbprint=$($certificate.Thumbprint) `
              -p:AppxBundle=Never `
              -p:AppxSymbolPackageEnabled=false `
              -p:UapAppxPackageBuildMode=SideloadOnly `
              -p:WindowsAppSDKSelfContained=false `
              -p:AppxPackageDir=$packageOutputWithSeparator
          if ($LASTEXITCODE -ne 0) {
              throw "Signed smoke-package publish failed with exit code $LASTEXITCODE."
          }

          $mainPackages = @(
              Get-ChildItem -LiteralPath $packageOutput -Recurse -File -Filter 'PackagePilot.App_*.msix'
          )
          $runtimePackages = @(
              Get-ChildItem -LiteralPath $packageOutput -Recurse -File -Filter 'Microsoft.WindowsAppRuntime.2*.msix' |
                  Where-Object FullName -Match '[\\/]Dependencies[\\/]x64[\\/]'
          )
          if ($mainPackages.Count -ne 1 -or $runtimePackages.Count -ne 1) {
              throw "Expected one app and one runtime package; found $($mainPackages.Count) app and $($runtimePackages.Count) runtime packages."
          }

          ./build/tests/PackagedUiSmoke.Tests.ps1 `
              -PackagePath $mainPackages[0].FullName `
              -DependencyPackagePath $runtimePackages[0].FullName `
              -CertificateThumbprint $certificate.Thumbprint `
              -ScreenshotDirectory $screenshotOutput

      - name: Upload packaged UI smoke screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packaged-ui-smoke-${{ github.run_id }}
          path: ${{ runner.temp }}\package-pilot-ui-smoke\screenshots\*.png
          if-no-files-found: warn
          retention-days: 7
