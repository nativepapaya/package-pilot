name: Validate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Restore
        shell: pwsh
        run: dotnet restore PackagePilot.slnx

      - name: Build
        shell: pwsh
        run: dotnet build PackagePilot.slnx --configuration Release --no-restore

      - name: Run deterministic tests
        shell: pwsh
        run: >-
          dotnet test tests/PackagePilot.Tests/PackagePilot.Tests.csproj
          --configuration Release
          --no-build
          --no-restore
          --logger "console;verbosity=normal"

      - name: Test release tooling
        shell: pwsh
        run: |
          ./build/tests/New-AppInstaller.Tests.ps1
          ./build/tests/Set-PackageVersion.Tests.ps1
